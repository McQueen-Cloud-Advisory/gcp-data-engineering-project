version: 2

models: 
  - name: stg_bts_on_time_performance
    data_tests:
      - dbt_utils.equal_rowcount:
          arguments:
            compare_model: source('raw', 'raw_airline_ontime_performance')
    columns:
      - name: fl_date
        data_tests:
          - not_null
      - name: mkt_unique_carrier
        data_tests:
          - not_null
      - name: origin
        data_tests:
          - not_null
      - name: dest
        data_tests:
          - not_null
      - name: is_cancelled
        data_tests:
          - not_null
      - name: is_diverted
        data_tests:
          - not_null